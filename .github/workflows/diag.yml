name: diag
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Dump config-api logs from control node
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=accept-new \
            root@api.fly-vpn.net \
            'journalctl -u config-api --no-pager -n 200 | tail -n 120'
