name: plan
on:
  pull_request:
    paths: ["infra/terraform/**"]
permissions:
  contents: read
jobs:
  tofu-plan:
    runs-on: ubuntu-latest
    # Секреты доступны только для PR из этого репо; форк-PR plan пропустит (это ок).
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.HCLOUD_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HCLOUD_S3_SECRET_KEY }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_key_names: '["${{ vars.SSH_KEY_NAME }}"]'
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.5"
      - name: fmt
        run: tofu fmt -check -recursive infra/terraform
      - name: init / validate / plan
        working-directory: infra/terraform/environments/mmvp
        run: |
          tofu init -input=false
          tofu validate
          tofu plan -input=false
