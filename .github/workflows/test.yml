name: test
on:
  pull_request:
    paths: ["services/**"]
  push:
    branches: [main]
    paths: ["services/**"]
permissions:
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        svc: [config-api, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: build / vet / test
        working-directory: services/${{ matrix.svc }}
        run: |
          go build ./...
          go vet ./...
          go test ./...   # интеграционные тесты сами пропускаются без *_TEST_DSN
