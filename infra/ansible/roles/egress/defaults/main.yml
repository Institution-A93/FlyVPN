---
# sing-box (VLESS-Reality server). Версия запинена (ADR-0015, воспроизводимость).
egress_singbox_version: "1.10.7"
egress_singbox_arch: "arm64"   # Hetzner CAX = ARM

egress_listen_port: 443
egress_flow: "xtls-rprx-vision"

# Камуфляж Reality: реальный сайт-донор TLS-хендшейка (ADR-0011).
egress_reality_server_name: "www.lovo.ai"   # SNI, который принимает сервер
egress_reality_dest_server: "www.lovo.ai"   # куда проксируется handshake/пробинг
egress_reality_dest_port: 443

# --- СЕКРЕТЫ/КЛИЕНТЫ от оркестратора (vault, ADR-0012); по умолчанию пусты ---
egress_reality_private_key: ""   # x25519 private key
egress_reality_short_ids: []     # список shortId
egress_clients: []               # [{uuid: <uuid>, name: <tag>}]

# DNS: рекурсивный резолвинг клиентов на egress (unbound, только локально).
egress_unbound_listen: "127.0.0.1"
egress_unbound_port: 5353
