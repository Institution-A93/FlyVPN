---
- name: Проверить, что секреты/клиенты Reality переданы
  ansible.builtin.assert:
    that:
      - egress_reality_private_key | length > 0
      - egress_clients | length > 0
    fail_msg: >-
      egress_reality_private_key и egress_clients должны прийти от оркестратора
      (vault). В репозитории секретов нет — см. README роли.
    quiet: true

- name: Базовые пакеты
  ansible.builtin.apt:
    name: [ca-certificates, curl]
    state: present
    update_cache: true

- name: Скачать sing-box (релиз с GitHub)
  ansible.builtin.unarchive:
    src: "https://github.com/SagerNet/sing-box/releases/download/v{{ egress_singbox_version }}/sing-box-{{ egress_singbox_version }}-linux-{{ egress_singbox_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1", "--wildcards", "*/sing-box"]
    creates: "/usr/local/bin/sing-box"
  notify: restart sing-box

# DNS клиентов резолвит сам sing-box через публичный резолвер (запрос уходит ИЗ egress —
# резолв на egress, не утекает из РФ). Отдельный unbound не нужен; если он остался от
# прежних прогонов и падает — нейтрализуем.
- name: Нейтрализовать unbound (если установлен) — sing-box резолвит сам
  ansible.builtin.systemd:
    name: unbound
    state: stopped
    enabled: false
    masked: true
  failed_when: false

- name: Каталог конфигурации sing-box
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Конфиг sing-box (VLESS-Reality server)
  ansible.builtin.template:
    src: singbox-egress.json.j2
    dest: /etc/sing-box/config.json
    owner: root
    group: root
    mode: "0640"
    validate: "/usr/local/bin/sing-box check -c %s"
  notify: restart sing-box

- name: systemd-юнит sing-box
  ansible.builtin.template:
    src: sing-box.service.j2
    dest: /etc/systemd/system/sing-box.service
    owner: root
    group: root
    mode: "0644"
  notify: restart sing-box

- name: Включить и запустить sing-box
  ansible.builtin.systemd:
    name: sing-box
    enabled: true
    state: started
    daemon_reload: true
