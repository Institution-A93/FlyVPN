---
- name: Проверить, что секреты/клиенты Reality переданы
  ansible.builtin.assert:
    that:
      - egress_reality_private_key | length > 0
      - egress_clients | length > 0
    fail_msg: >-
      egress_reality_private_key и egress_clients должны прийти от оркестратора
      (vault). В репозитории секретов нет — см. README роли.
    quiet: true

- name: Базовые пакеты (без unbound — он перехватывает DNS)
  ansible.builtin.apt:
    name: [ca-certificates, curl]
    state: present
    update_cache: true

- name: Скачать sing-box (релиз с GitHub)
  ansible.builtin.unarchive:
    src: "https://github.com/SagerNet/sing-box/releases/download/v{{ egress_singbox_version }}/sing-box-{{ egress_singbox_version }}-linux-{{ egress_singbox_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1", "--wildcards", "*/sing-box"]
    creates: "/usr/local/bin/sing-box"
  notify: restart sing-box

- name: Установить unbound
  ansible.builtin.apt:
    name: [unbound]
    state: present

# Установка unbound перехватывает системный resolv.conf на локальный резолвер.
# Нам unbound нужен ТОЛЬКО для sing-box (порт 5353), не как системный. Пиним
# системный resolv.conf на рекурсивные резолверы Hetzner.
- name: Системный resolv.conf на резолверы Hetzner (unbound не трогает систему)
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Управляется Ansible (роль egress). Системный DNS — резолверы Hetzner.
      # unbound на 127.0.0.1:{{ egress_unbound_port }} обслуживает только sing-box.
      nameserver 185.12.64.1
      nameserver 185.12.64.2

- name: Отключить resolvconf-интеграцию unbound (если есть)
  ansible.builtin.systemd:
    name: unbound-resolvconf
    enabled: false
    state: stopped
  failed_when: false

- name: Каталог конфигурации sing-box
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Конфиг sing-box (VLESS-Reality server)
  ansible.builtin.template:
    src: singbox-egress.json.j2
    dest: /etc/sing-box/config.json
    owner: root
    group: root
    mode: "0640"
    validate: "/usr/local/bin/sing-box check -c %s"
  notify: restart sing-box

- name: systemd-юнит sing-box
  ansible.builtin.template:
    src: sing-box.service.j2
    dest: /etc/systemd/system/sing-box.service
    owner: root
    group: root
    mode: "0644"
  notify: restart sing-box

- name: Убрать прежний кастомный конфиг unbound (конфликтовал с дефолтом)
  ansible.builtin.file:
    path: /etc/unbound/unbound.conf.d/egress.conf
    state: absent
  notify: restart unbound

- name: Включить и запустить unbound (дефолтный рекурсивный резолвер на 127.0.0.1:53)
  ansible.builtin.systemd:
    name: unbound
    enabled: true
    state: started

- name: Включить и запустить sing-box
  ansible.builtin.systemd:
    name: sing-box
    enabled: true
    state: started
    daemon_reload: true
