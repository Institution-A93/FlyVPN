---
# sing-box (VLESS-Reality client + TUN). Версия запинена (ADR-0015).
ingress_singbox_version: "1.10.7"
ingress_singbox_arch: "amd64"

# TUN и policy-routing клиентского трафика в sing-box.
ingress_tun_name: "sb-tun"
ingress_tun_addr: "172.19.0.1/30"
ingress_client_pool: "10.8.0.0/14"   # пул strongSwan (Framed-IP)
ingress_route_table: 100

# Reality-клиент → egress. Параметры/секреты от оркестратора (vault, ADR-0012).
ingress_egress_server: ""            # публичный IP/host egress
ingress_egress_port: 443
ingress_reality_uuid: ""             # client uuid (есть среди egress_clients)
ingress_reality_public_key: ""       # public key Reality egress
ingress_reality_short_id: ""         # shortId
ingress_reality_server_name: "www.lovo.ai"
ingress_flow: "xtls-rprx-vision"

# DNS клиентов резолвится на egress (через туннель), не утекает из РФ.
ingress_dns_upstream: "1.1.1.1"

# --- strongSwan (IKEv2 + EAP-RADIUS на control plane) ---
ingress_vpn_id: "vpn.example.com"    # id сервера = CN серверного серта
# Серверный серт/ключ кладёт оркестратор (ключ — под FDE), вне репозитория:
ingress_server_cert_path: "/etc/swanctl/x509/server-cert.pem"
ingress_server_key_path: "/etc/swanctl/private/server-key.pem"
# RADIUS на control plane — секрет из vault:
ingress_radius_server: ""
ingress_radius_secret: ""
ingress_radius_auth_port: 1812
ingress_radius_acct_port: 1813

# RU-префиксы для rule_set (источники — OSS, ADR-0009/0006).
ingress_ru_sources:
  - "https://antifilter.download/list/allyouneed.lst"  # пример; уточнить формат/источник
