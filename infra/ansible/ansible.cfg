[defaults]
inventory = ./inventory.ini
roles_path = ./roles
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent
timeout = 30

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
retries = 5
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15
